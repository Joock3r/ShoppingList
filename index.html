<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשימת קניות</title>

<style>
    :root {
        --primary: #2563eb;
        --primary-light: #dbeafe;
        --accent: #22c55e;
        --bg: #eef2f7;
        --card-bg: #ffffff;
        --text-main: #111827;
        --text-muted: #6b7280;
        --danger: #ef4444;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 16px;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: radial-gradient(circle at top, #e0f2fe 0, #eef2f7 45%, #e5e7eb 100%);
        color: var(--text-main);
    }

    .app {
        max-width: 640px;
        margin: 0 auto;
    }

    .header {
        text-align: center;
        margin-bottom: 16px;
    }

    .title {
        font-size: 28px;
        font-weight: 700;
        margin: 0;
    }

    .subtitle {
        margin: 4px 0 0;
        font-size: 14px;
        color: var(--text-muted);
    }

    .card {
        background: var(--card-bg);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        margin-bottom: 16px;
    }

    .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
    }

    .toolbar button {
        flex: 1;
    }

    .input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
    }

    input, select {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        font-size: 15px;
        outline: none;
        background: #f9fafb;
        transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    input:focus, select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        background: #ffffff;
    }

    button {
        padding: 10px 14px;
        border-radius: 999px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        white-space: nowrap;
    }

    button:active {
        transform: translateY(1px);
        box-shadow: none;
    }

    .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
    }

    .btn-primary:hover {
        background: #1d4ed8;
    }

    .btn-danger {
        background: var(--danger);
        color: white;
        box-shadow: 0 10px 20px rgba(239, 68, 68, 0.35);
    }

    .btn-danger:hover {
        background: #dc2626;
    }

    .btn-ghost {
        background: #f3f4f6;
        color: var(--text-main);
        box-shadow: none;
    }

    .btn-ghost:hover {
        background: #e5e7eb;
    }

    .section-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
        margin: 0 0 8px;
    }

    ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    li {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 14px;
        padding: 10px 12px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s, box-shadow 0.1s;
        box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    li:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }

    li.checked {
        text-decoration: line-through;
        background: #e5e7eb;
        color: #6b7280;
        box-shadow: none;
    }

    .item-main {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .item-name {
        font-weight: 600;
        font-size: 15px;
    }

    .item-meta {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .chip {
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--primary-light);
        color: #1d4ed8;
        font-size: 11px;
        font-weight: 600;
    }

    .qty {
        font-size: 12px;
    }

    .empty-state {
        text-align: center;
        padding: 16px;
        color: var(--text-muted);
        font-size: 14px;
    }

    @media (max-width: 480px) {
        .card {
            border-radius: 16px;
            padding: 14px;
        }
        .title {
            font-size: 24px;
        }
    }
</style>
</head>

<body>
<div class="app">

    <header class="header">
        <h1 class="title">רשימת קניות</h1>
        <p class="subtitle">הוסף פריטים, סמן מה נקנה, והכל נשמר בגוגל שיטס</p>
    </header>

    <div class="card">
        <div class="toolbar">
            <button id="clearBtn" class="btn-danger">
                נקה הכל (למעט ✓)
            </button>
            <button class="btn-ghost" onclick="loadData()">
                רענן
            </button>
        </div>

        <p class="section-title">הוספת פריט</p>

        <div class="input-row">
            <input id="itemInput" type="text" placeholder="שם פריט">
            <input id="qtyInput" type="number" placeholder="כמות" min="1" value="1">
        </div>

        <div class="input-row">
            <select id="categorySelect">
                <option value="">טוען קטגוריות...</option>
            </select>
            <button class="btn-primary" onclick="addItem()">הוסף פריט</button>
        </div>

        <p class="section-title">קטגוריות</p>

        <div class="input-row">
            <input id="newCategoryInput" type="text" placeholder="הוסף קטגוריה חדשה (למשל: ירקות)">
            <button class="btn-ghost" onclick="addCategory()">הוסף קטגוריה</button>
        </div>
    </div>

    <div class="card">
        <p class="section-title">הפריטים שלך</p>
        <ul id="itemList"></ul>
        <div id="emptyState" class="empty-state" style="display:none;">
            אין עדיין פריטים ברשימה. התחל בלכתוב פריט למעלה ולהוסיף אותו.
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzukGRxVhXVJhK5HW3mcKMCxn-eEDtH4H-10bVD-CsMIJZN5cqFC6RTXiSlQe_3Kxg/exec";

// Load data from Google Sheets
async function loadData() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        console.log("Data from server:", data);

        window.categories = data.categories || [];
        window.items = data.items || [];

        renderCategories();
        renderItems();
    } catch (err) {
        console.error("Error loading data:", err);
        alert("שגיאה בטעינת הנתונים. בדוק את כתובת ה-API או את הסקריפט.");
    }
}

// Render categories in dropdown
function renderCategories() {
    const select = document.getElementById("categorySelect");
    select.innerHTML = "";

    if (!window.categories || window.categories.length === 0) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "אין קטגוריות (בדוק את הגיליון)";
        select.appendChild(opt);
        return;
    }

    window.categories.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
    });
}

// Render items list
function renderItems() {
    const list = document.getElementById("itemList");
    const emptyState = document.getElementById("emptyState");
    list.innerHTML = "";

    if (!window.items || window.items.length === 0) {
        emptyState.style.display = "block";
        return;
    } else {
        emptyState.style.display = "none";
    }

    window.items.forEach((item, index) => {
        const li = document.createElement("li");

        const keepVal = item.Keep === true || item.Keep === "TRUE";
        if (keepVal) li.classList.add("checked");

        li.innerHTML = `
            <div class="item-main">
                <span class="item-name">${item.Item}</span>
                <div class="item-meta">
                    <span class="chip">${item.Category || "ללא קטגוריה"}</span>
                    <span class="qty">כמות: ${item.Quantity || 1}</span>
                </div>
            </div>
        `;

        li.onclick = () => toggleItem(index);
        list.appendChild(li);
    });
}

// Add item
async function addItem() {
    const item = document.getElementById("itemInput").value.trim();
    const qty = document.getElementById("qtyInput").value || 1;
    const cat = document.getElementById("categorySelect").value;

    if (!item) {
        alert("נא להזין שם פריט.");
        return;
    }

    try {
        // Change: Added 'method', 'body', and redirected the fetch
        await fetch(API_URL, {
            method: "POST",
            mode: "no-cors", // This is often necessary for GAS POST requests
            headers: {
                "Content-Type": "text/plain", // Use text/plain to avoid CORS pre-flight
            },
            body: JSON.stringify({
                action: "addItem",
                item,
                qty,
                cat
            })
        });

        // Since 'no-cors' won't let us read the response, 
        // we just assume success and reload the data.
        document.getElementById("itemInput").value = "";
        document.getElementById("qtyInput").value = 1;
        
        // Wait a second for Google's servers to catch up before refreshing
        setTimeout(loadData, 500); 
        
    } catch (err) {
        console.error("Error adding item:", err);
        alert("שגיאה בהוספת פריט.");
    }
}

// Toggle item checked state
async function toggleItem(index) {
    try {
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "toggleItem",
                index
            })
        });

        await loadData();
    } catch (err) {
        console.error("Error toggling item:", err);
        alert("שגיאה בעדכון פריט.");
    }
}

// Add new category
async function addCategory() {
    const newCat = document.getElementById("newCategoryInput").value.trim();
    if (!newCat) {
        alert("נא להזין שם קטגוריה.");
        return;
    }

    try {
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "addCategory",
                category: newCat
            })
        });

        document.getElementById("newCategoryInput").value = "";
        await loadData(); // refresh categories + items
    } catch (err) {
        console.error("Error adding category:", err);
        alert("שגיאה בהוספת קטגוריה.");
    }
}

// Clear all items except checked ones
async function clearAll() {
    if (!confirm("למחוק את כל הפריטים שאינם מסומנים ✓?")) return;

    try {
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "clearAll"
            })
        });

        await loadData();
    } catch (err) {
        console.error("Error clearing items:", err);
        alert("שגיאה בניקוי הרשימה.");
    }
}

document.getElementById("clearBtn").onclick = clearAll;

// Initial load
loadData();
</script>

</body>
</html>
